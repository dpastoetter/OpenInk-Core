<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://corsproxy.io https://api.coingecko.com https://nominatim.openstreetmap.org https://api.open-meteo.com https://geocoding-api.open-meteo.com https://api.dictionaryapi.dev; font-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/openink-logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>OpenInk</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript><p style="padding:1rem;font-family:system-ui,sans-serif;">OpenInk needs JavaScript. Please enable it or use a supported browser.</p></noscript>
    <script>
      // If the app does not render within 8s (e.g. Kindle or old browser), show a fallback.
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          root.innerHTML = '<p style="padding:1rem;font-family:system-ui,sans-serif;font-size:1rem;">OpenInk could not load on this browser (e.g. Kindle). Try a desktop or phone browser.</p>';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
