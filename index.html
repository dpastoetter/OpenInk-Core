<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var path = window.location.pathname || '';
        if (/legacy(-static|-full|-minimal)?\.html$/i.test(path)) {
          return;
        }
        var ua = (typeof navigator !== 'undefined' && navigator.userAgent) ? navigator.userAgent : '';
        var kindle = /\b(Kindle|Silk|Oasis|Experimental|KFGIWI|KFTUWI|KFTT|KFAPWA|KFJW)\b/i.test(ua);
        var obfuscatedEink = /AppleWebKit\/53\d/.test(ua) && /Safari\/53\d/.test(ua) && !/Chrome/i.test(ua);
        var modern = /Chrome\/[89]\d|Chrome\/1\d\d|Firefox\/[789]\d|Firefox\/1\d\d|Edg\/[89]\d|Edg\/1\d\d|Version\/1[3-9]|Version\/2\d/i.test(ua);
        if (kindle || obfuscatedEink || !modern) {
          window.location.replace('legacy.html');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://corsproxy.io https://api.coingecko.com https://nominatim.openstreetmap.org https://api.open-meteo.com https://geocoding-api.open-meteo.com https://api.dictionaryapi.dev; font-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/openink-logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>OpenInk</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript><p style="padding:1rem;font-family:system-ui,sans-serif;">OpenInk needs JavaScript.</p></noscript>
    <script>
      (function() {
        var path = (window.location.pathname || '');
        if (/legacy(-static|-full|-minimal)?\.html$/i.test(path)) {
          var root = document.getElementById('root');
          if (root) {
            root.innerHTML = '<p style="padding:1.5rem;font-family:Arial,Verdana,sans-serif;max-width:28em;">You opened a legacy URL but the server returned the main app instead of the legacy page. Deploy the full <code>dist/</code> folder and ensure your host serves <code>legacy.html</code> and <code>legacy-static.html</code> as static files (do not rewrite them to index.html). See docs/KINDLE-COMPATIBILITY.md.</p>';
          }
          return;
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0 && !/legacy(-static|-full|-minimal)?\.html/.test(window.location.pathname)) {
          root.innerHTML = '<p style="padding:1.5rem;font-family:system-ui,sans-serif;">Loading… If this persists, try <a href="legacy.html">legacy</a> or another browser.</p>';
        }
      }, 10000);
    </script>
  </body>
</html>
